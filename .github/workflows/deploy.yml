name: Deploy Sound Safari to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
```

---

### Step 3 — Commit the change

Scroll down → click **Commit changes** → **Commit changes** again

---

### Step 4 — Set Pages source to GitHub Actions

- Go to **Settings → Pages → Source → GitHub Actions → Save**

Now you should see the **GitHub Actions** option available since a valid workflow exists.

---

### Step 5 — Run it

Go to **Actions tab** → click your workflow → **Run workflow** → **Run workflow**

After ~1 minute your site will be live at:
```
https://YOUR_USERNAME.github.io/sound-safari/
